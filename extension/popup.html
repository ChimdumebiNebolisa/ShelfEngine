<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShelfEngine Sync</title>
  <style>
    body {
      width: 260px;
      padding: 12px 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 600;
    }
    .status {
      margin: 0 0 10px 0;
      color: #666;
      font-size: 12px;
      line-height: 1.4;
    }
    button {
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 8px;
      font-size: 14px;
      cursor: pointer;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
    }
    button:hover {
      background: #2a2a4e;
    }
    button:last-of-type {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <h1>ShelfEngine Sync</h1>
  <div id="status" class="status">Status: loading…</div>
  <button id="open">Open ShelfEngine</button>
  <button id="resync">Resync all bookmarks</button>
  <script src="popup.js"></script>
</body>
</html>
